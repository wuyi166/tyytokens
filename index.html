<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客登录</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-floating {
            margin-bottom: 15px;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            height: 56px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        /* 验证码输入框样式 - 修复圆角 */
        .verify-input {
            border-top-right-radius: 0 !important;
            border-bottom-right-radius: 0 !important;
            border-right: none;
        }
        
        /* 获取验证码按钮样式 */
        .btn-verify {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid #667eea;
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s ease;
            height: 56px;
        }
        
        .btn-verify:hover:not(:disabled) {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            transform: translateX(2px);
        }
        
        .btn-verify:disabled {
            background: #e0e0e0;
            border-color: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            height: 56px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            transform: none;
            box-shadow: none;
        }
        
        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 36px;
        }
        
        .alert {
            border-radius: 12px;
            border: none;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 输入框组样式修复 */
        .input-group-verify {
            margin-bottom: 20px;
        }
        
        .input-group-verify .form-control {
            height: 56px;
            border-radius: 12px 0 0 12px;
        }
        
        /* 倒计时样式 */
        .countdown-text {
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <div class="icon-box">
            <i class="bi bi-journal-text"></i>
        </div>
        <h2>博客登录</h2>
        <p>欢迎回来，请登录您的账户</p>
    </div>
    
    <div id="alertBox" class="alert alert-danger d-none" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span id="alertMessage"></span>
    </div>
    
    <div id="successBox" class="alert alert-success d-none" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span id="successMessage"></span>
    </div>
    
    <form id="loginForm" novalidate>
        <!-- 手机号码输入 -->
        <div class="form-floating mb-3">
            <input type="tel" class="form-control" id="phoneNumber" placeholder="请输入手机号码" maxlength="11">
            <label for="phoneNumber">
                <i class="bi bi-phone me-2"></i>手机号码
            </label>
            <div class="invalid-feedback">
                请输入正确的11位手机号码
            </div>
        </div>
        
        <!-- 验证码输入 - 修复样式 -->
        <div class="input-group input-group-verify">
            <input type="text" class="form-control verify-input" id="verifyCode" placeholder="请输入验证码" maxlength="6" disabled>
            <button class="btn btn-verify" type="button" id="getCodeBtn" disabled>
                获取验证码
            </button>
        </div>
        
        <!-- 登录按钮 -->
        <button type="submit" class="btn btn-primary w-100" id="loginBtn" disabled>
            <span class="loading-spinner" id="loginSpinner"></span>
            <span id="loginBtnText">登 录</span>
        </button>
    </form>
    
    <div class="text-center mt-4">
        <small class="text-muted">
            备案号：渝ICP备2022009034号-1
        </small>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 获取DOM元素
    const phoneInput = document.getElementById('phoneNumber');
    const codeInput = document.getElementById('verifyCode');
    const getCodeBtn = document.getElementById('getCodeBtn');
    const loginBtn = document.getElementById('loginBtn');
    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const alertMessage = document.getElementById('alertMessage');
    const successBox = document.getElementById('successBox');
    const successMessage = document.getElementById('successMessage');
    const loginSpinner = document.getElementById('loginSpinner');
    const loginBtnText = document.getElementById('loginBtnText');
    
    let countdown = 60;
    let timer = null;
    
    // 验证手机号格式
    function isValidPhone(phone) {
        const reg = /^1[3-9]\d{9}$/;
        return reg.test(phone);
    }
    
    // 显示错误提示
    function showAlert(message) {
        alertMessage.textContent = message;
        alertBox.classList.remove('d-none');
        successBox.classList.add('d-none');
        setTimeout(() => {
            alertBox.classList.add('d-none');
        }, 3000);
    }
    
    // 显示成功提示
    function showSuccess(message) {
        successMessage.textContent = message;
        successBox.classList.remove('d-none');
        alertBox.classList.add('d-none');
        setTimeout(() => {
            successBox.classList.add('d-none');
        }, 3000);
    }
    
    // 手机号输入监听
    phoneInput.addEventListener('input', function() {
        const phone = this.value;
        
        // 只允许输入数字
        this.value = phone.replace(/\D/g, '');
        
        if (isValidPhone(this.value)) {
            getCodeBtn.disabled = false;
            phoneInput.classList.remove('is-invalid');
            phoneInput.classList.add('is-valid');
        } else {
            getCodeBtn.disabled = true;
            phoneInput.classList.remove('is-valid');
            if (this.value.length === 11) {
                phoneInput.classList.add('is-invalid');
            }
        }
        
        checkLoginButton();
    });
    
    // 验证码输入监听
    codeInput.addEventListener('input', function() {
        // 只允许输入数字
        this.value = this.value.replace(/\D/g, '');
        checkLoginButton();
    });
    
    // 检查登录按钮状态
    function checkLoginButton() {
        if (isValidPhone(phoneInput.value) && codeInput.value.length === 6) {
            loginBtn.disabled = false;
        } else {
            loginBtn.disabled = true;
        }
    }
    
    // 获取验证码
    getCodeBtn.addEventListener('click', function() {
        if (!isValidPhone(phoneInput.value)) {
            showAlert('请输入正确的手机号码');
            return;
        }
        
        // 模拟发送验证码
        getCodeBtn.disabled = true;
        const originalText = getCodeBtn.textContent;
        getCodeBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>发送中';
        
        setTimeout(() => {
            showSuccess('验证码已发送至 ' + phoneInput.value.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2'));
            codeInput.disabled = false;
            codeInput.focus();
            
            // 开始倒计时
            startCountdown(originalText);
        }, 1000);
    });
    
    // 倒计时功能
    function startCountdown(originalText) {
        countdown = 60;
        getCodeBtn.disabled = true;
        
        timer = setInterval(() => {
            countdown--;
            getCodeBtn.innerHTML = `<span class="countdown-text">${countdown}秒后重试</span>`;
            
            if (countdown <= 0) {
                clearInterval(timer);
                getCodeBtn.disabled = false;
                getCodeBtn.textContent = originalText;
            }
        }, 1000);
    }
    
    // 表单提交
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        if (!isValidPhone(phoneInput.value)) {
            showAlert('请输入正确的手机号码');
            return;
        }
        
        if (codeInput.value.length !== 6) {
            showAlert('请输入6位验证码');
            return;
        }
        
        // 模拟登录请求
        loginBtn.disabled = true;
        loginSpinner.style.display = 'inline-block';
        loginBtnText.textContent = '登录中...';
        
        setTimeout(() => {
            loginSpinner.style.display = 'none';
            loginBtnText.textContent = '登 录';
            loginBtn.disabled = false;
            
            showSuccess('登录成功！正在跳转...');
            
            // 模拟跳转
            setTimeout(() => {
                // window.location.href = '/dashboard';
                console.log('登录成功，手机号：', phoneInput.value);
            }, 1500);
        }, 2000);
    });
    
    // 页面加载动画
    window.addEventListener('load', () => {
        phoneInput.focus();
    });
</script>

</body>
</html>
